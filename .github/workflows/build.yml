name: Build GeoSite & GeoIP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"  # Daily at 4 AM UTC
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      V2FLY_DATA_URL: https://raw.githubusercontent.com/v2fly/domain-list-community/master/data
      ANTIFILTER_DOMAINS: https://community.antifilter.download/list/domains.lst
      ANTIFILTER_IPS: https://community.antifilter.download/list/community.lst
      REFILTER_DOMAINS: https://raw.githubusercontent.com/1andrevich/Re-filter-lists/main/domains_all.lst
      REFILTER_IPS: https://raw.githubusercontent.com/1andrevich/Re-filter-lists/main/ipsum.lst

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Create data directory
        run: mkdir -p data

      # --- Download all sources ---
      - name: Download sources
        run: |
          set -e
          mkdir -p /tmp/v2fly

          echo "=== Downloading V2Fly domain lists ==="

          # Download RU with recursive includes
          echo "category-ru" > /tmp/v2fly-queue.txt
          echo "category-gov-ru" >> /tmp/v2fly-queue.txt

          while [ -s /tmp/v2fly-queue.txt ]; do
            file=$(head -1 /tmp/v2fly-queue.txt)
            sed -i '1d' /tmp/v2fly-queue.txt
            outfile="/tmp/v2fly/${file}"
            [ -f "$outfile" ] && continue
            echo "  Downloading: $file"
            if curl -fsSL "${V2FLY_DATA_URL}/${file}" -o "$outfile" 2>/dev/null; then
              grep '^include:' "$outfile" 2>/dev/null | sed 's/^include://' | sed 's/@.*//' >> /tmp/v2fly-queue.txt || true
            else
              echo "  Warning: Failed to download $file"
            fi
          done

          # Download BY and KZ separately
          echo "  Downloading: category-by"
          curl -fsSL "${V2FLY_DATA_URL}/category-by" -o /tmp/v2fly/category-by 2>/dev/null || echo "  Warning: category-by not found"

          echo "  Downloading: category-kz"
          curl -fsSL "${V2FLY_DATA_URL}/category-kz" -o /tmp/v2fly/category-kz 2>/dev/null || echo "  Warning: category-kz not found"

          echo "=== Downloaded v2fly files ==="
          ls -la /tmp/v2fly/

          echo "=== Downloading AntiFilter domains ==="
          curl -fsSL "$ANTIFILTER_DOMAINS" -o /tmp/antifilter-domains.lst || echo "Warning: Failed to download AntiFilter"

          echo "=== Downloading Re-filter domains ==="
          curl -fsSL "$REFILTER_DOMAINS" -o /tmp/refilter-domains.lst || echo "Warning: Failed to download Re-filter"

          echo "=== Downloading AntiFilter IPs ==="
          curl -fsSL "$ANTIFILTER_IPS" -o /tmp/antifilter-ips.lst || echo "Warning: Failed to download AntiFilter IPs"

          echo "=== Downloading Re-filter IPs ==="
          curl -fsSL "$REFILTER_IPS" -o /tmp/refilter-ips.lst || echo "Warning: Failed to download Re-filter IPs"

      # --- Build domain lists by region ---
      - name: Build domain lists
        run: |
          set -e

          # Helper function to normalize domains
          normalize_domains() {
            grep -v '^#' | \
            grep -v '^$' | \
            grep -v '^include:' | \
            grep -v '^regexp:' | \
            grep -v '^keyword:' | \
            sed 's/^full://g' | \
            sed 's/^domain://g' | \
            sed 's/@.*//g' | \
            tr -d ' ' | \
            tr '[:upper:]' '[:lower:]' | \
            sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | \
            grep -E '^[a-z0-9]([a-z0-9\-]*[a-z0-9])?(\.[a-z0-9]([a-z0-9\-]*[a-z0-9])?)*$' | \
            sort -u
          }

          echo "=== Building category-ru ==="
          # RU = v2fly RU lists + AntiFilter + Re-filter
          {
            for f in /tmp/v2fly/*; do
              [ -f "$f" ] || continue
              name=$(basename "$f")
              # Skip BY and KZ
              [[ "$name" == "category-by" || "$name" == "category-kz" ]] && continue
              cat "$f"
            done
            cat /tmp/antifilter-domains.lst 2>/dev/null || true
            cat /tmp/refilter-domains.lst 2>/dev/null || true
          } | normalize_domains > data/category-ru
          echo "category-ru: $(wc -l < data/category-ru) domains"

          echo "=== Building category-by ==="
          if [ -f /tmp/v2fly/category-by ]; then
            cat /tmp/v2fly/category-by | normalize_domains > data/category-by
            echo "category-by: $(wc -l < data/category-by) domains"
          else
            touch data/category-by
            echo "category-by: 0 domains (source not available)"
          fi

          echo "=== Building category-kz ==="
          if [ -f /tmp/v2fly/category-kz ]; then
            cat /tmp/v2fly/category-kz | normalize_domains > data/category-kz
            echo "category-kz: $(wc -l < data/category-kz) domains"
          else
            touch data/category-kz
            echo "category-kz: 0 domains (source not available)"
          fi

          # Verify main list is not empty
          if [ ! -s data/category-ru ]; then
            echo "ERROR: category-ru is empty!"
            exit 1
          fi

      # --- Build IP lists ---
      - name: Build IP lists
        run: |
          set -e

          normalize_ips() {
            grep -v '^#' | \
            grep -v '^$' | \
            sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | \
            grep -E '^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}(/[0-9]{1,2})?$' | \
            sort -u -t. -k1,1n -k2,2n -k3,3n -k4,4n
          }

          echo "=== Building category-ru-ip ==="
          cat /tmp/antifilter-ips.lst /tmp/refilter-ips.lst 2>/dev/null | normalize_ips > data/category-ru-ip
          echo "category-ru-ip: $(wc -l < data/category-ru-ip) IPs"

          if [ ! -s data/category-ru-ip ]; then
            echo "ERROR: category-ru-ip is empty!"
            exit 1
          fi

      # --- Build geosite.dat and geoip.dat ---
      - name: Build geosite.dat and geoip.dat
        run: |
          go mod tidy
          go run main.go \
            --datapath=./data \
            --outputdir=./ \
            --domainlists=category-ru,category-by,category-kz \
            --iplists=category-ru-ip \
            --exportlists=category-ru,category-ru-ip

      # --- Generate Mihomo YAML files ---
      - name: Generate Mihomo YAML
        run: |
          for list in category-ru category-by category-kz; do
            if [ -s "data/$list" ]; then
              echo "Generating ${list}.yaml..."
              { echo "payload:"; sed 's/^/  - DOMAIN-SUFFIX,/' "data/$list"; } > "${list}.yaml"
              echo "${list}.yaml: $(wc -l < "${list}.yaml") lines"
            fi
          done

          echo "Generating category-ru-ip.yaml..."
          { echo "payload:"; sed 's/^/  - IP-CIDR,/' "data/category-ru-ip"; } > "category-ru-ip.yaml"
          echo "category-ru-ip.yaml: $(wc -l < "category-ru-ip.yaml") lines"

      # --- Generate checksums ---
      - name: Generate checksums
        run: |
          sha256sum geosite.dat > geosite.dat.sha256sum
          sha256sum geoip.dat > geoip.dat.sha256sum

      # --- Create release ---
      - name: Generate release tag
        id: tag
        run: echo "release_tag=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          body: |
            ## Flowvy Routing - Auto Release

            **Build time:** ${{ steps.tag.outputs.release_tag }}

            ### Files
            **Xray/V2Ray:**
            - `geosite.dat` - Domain routing rules
            - `geoip.dat` - IP routing rules

            **Mihomo (Clash):**
            - `category-ru.yaml`, `category-by.yaml`, `category-kz.yaml` - Domain rules
            - `category-ru-ip.yaml` - IP rules

            ### Categories (geosite.dat)
            | Category | Description |
            |----------|-------------|
            | `category-ru` | Russia (v2fly + AntiFilter + Re-filter) |
            | `category-by` | Belarus (v2fly) |
            | `category-kz` | Kazakhstan (v2fly) |

            ### Categories (geoip.dat)
            | Category | Description |
            |----------|-------------|
            | `category-ru-ip` | Russia IPs (AntiFilter + Re-filter) |

            ### Usage in Xray/V2Ray
            ```json
            {
              "routing": {
                "rules": [
                  {"type": "field", "domain": ["geosite:category-ru"], "outboundTag": "direct"},
                  {"type": "field", "ip": ["geoip:category-ru-ip"], "outboundTag": "direct"}
                ]
              }
            }
            ```

            ### Usage in Mihomo (Clash)
            ```yaml
            rule-providers:
              ru-domain:
                type: http
                behavior: domain
                url: "https://github.com/this-xkit/flowvy_routing/releases/latest/download/category-ru.yaml"
                path: ./rules/category-ru.yaml
                interval: 86400

            rules:
              - RULE-SET,ru-domain,DIRECT
            ```

            ### Sources
            - [v2fly/domain-list-community](https://github.com/v2fly/domain-list-community)
            - [1andrevich/Re-filter-lists](https://github.com/1andrevich/Re-filter-lists)
            - [community.antifilter.download](https://community.antifilter.download/)
          files: |
            geosite.dat
            geosite.dat.sha256sum
            geoip.dat
            geoip.dat.sha256sum
            category-ru.yaml
            category-by.yaml
            category-kz.yaml
            category-ru-ip.yaml
            category-ru.txt
            category-ru-ip.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
