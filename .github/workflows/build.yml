name: Build GeoSite & GeoIP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 0"  # Weekly on Sunday at 4 AM UTC
  push:
    branches:
      - main
    paths:
      - "data/**"
      - "main.go"
      - ".github/workflows/build.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      V2FLY_DATA_URL: https://raw.githubusercontent.com/v2fly/domain-list-community/master/data
      ANTIFILTER_DOMAINS: https://community.antifilter.download/list/domains.lst
      ANTIFILTER_IPS: https://community.antifilter.download/list/community.lst
      REFILTER_DOMAINS: https://raw.githubusercontent.com/1andrevich/Re-filter-lists/main/domains_all.lst
      REFILTER_IPS: https://raw.githubusercontent.com/1andrevich/Re-filter-lists/main/ipsum.lst

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Create data directory
        run: mkdir -p data

      # --- Build category-cis-domain (all CIS domains combined) ---
      - name: Build category-cis-domain
        run: |
          echo "=== Downloading V2Fly CIS categories ==="

          # Download function with recursive includes
          download_v2fly() {
            local file=$1
            local url="${V2FLY_DATA_URL}/${file}"
            local tmp="/tmp/v2fly-${file}"

            if [ -f "$tmp" ]; then return 0; fi

            echo "Downloading: $file"
            curl -sSL "$url" -o "$tmp" 2>/dev/null || return 1

            # Process includes
            grep "^include:" "$tmp" 2>/dev/null | cut -d: -f2 | while read inc; do
              download_v2fly "$inc"
            done
          }

          # Download all CIS categories (without UA)
          for cat in category-ru category-by category-kz category-gov-ru; do
            download_v2fly "$cat"
          done

          echo "=== Downloading AntiFilter domains ==="
          curl -sSL "$ANTIFILTER_DOMAINS" -o /tmp/antifilter-domains.lst || true

          echo "=== Downloading Re-filter domains ==="
          curl -sSL "$REFILTER_DOMAINS" -o /tmp/refilter-domains.lst || true

          echo "=== Combining all CIS domains ==="

          # Extract domains from v2fly files (remove prefixes, comments, etc.)
          for f in /tmp/v2fly-*; do
            [ -f "$f" ] || continue
            cat "$f" | \
              grep -v '^#' | \
              grep -v '^$' | \
              grep -v '^include:' | \
              grep -v '^regexp:' | \
              grep -v '^keyword:' | \
              sed 's/^full://g' | \
              sed 's/^domain://g' | \
              sed 's/@.*//g' | \
              tr -d ' '
          done > /tmp/v2fly-domains.txt

          # Combine all sources
          cat /tmp/v2fly-domains.txt \
              /tmp/antifilter-domains.lst \
              /tmp/refilter-domains.lst 2>/dev/null | \
            grep -v '^#' | \
            grep -v '^$' | \
            sort -u > data/category-cis-domain

          echo "category-cis-domain: $(wc -l < data/category-cis-domain) domains"

      # --- Build category-cis-ip (all CIS IPs combined) ---
      - name: Build category-cis-ip
        run: |
          echo "=== Downloading AntiFilter IPs ==="
          curl -sSL "$ANTIFILTER_IPS" -o /tmp/antifilter-ips.lst || true

          echo "=== Downloading Re-filter IPs ==="
          curl -sSL "$REFILTER_IPS" -o /tmp/refilter-ips.lst || true

          echo "=== Combining all CIS IPs ==="
          cat /tmp/antifilter-ips.lst /tmp/refilter-ips.lst 2>/dev/null | \
            grep -v '^#' | \
            grep -v '^$' | \
            sort -u > data/category-cis-ip

          echo "category-cis-ip: $(wc -l < data/category-cis-ip) IPs"

      # --- Copy custom domains if exists ---
      - name: Prepare custom domains
        run: |
          if [ -f "data/custom" ] && [ -s "data/custom" ]; then
            grep -v '^#' data/custom | grep -v '^$' >> data/category-cis-domain
            sort -u -o data/category-cis-domain data/category-cis-domain
            echo "Added custom domains"
          fi

      # --- Build geosite.dat ---
      - name: Build geosite.dat
        run: |
          go mod tidy
          go run main.go \
            --datapath=./data \
            --outputdir=./ \
            --outputname=geosite.dat \
            --exportlists=category-cis-domain

      # --- Download geoip.dat from v2fly ---
      - name: Download geoip.dat
        run: |
          echo "Downloading v2fly geoip.dat..."
          curl -sSL "https://github.com/v2fly/geoip/releases/latest/download/geoip.dat" -o geoip.dat

      # --- Generate checksums ---
      - name: Generate checksums
        run: |
          sha256sum geosite.dat > geosite.dat.sha256sum
          sha256sum geoip.dat > geoip.dat.sha256sum

      # --- Create release ---
      - name: Generate release tag
        id: tag
        run: echo "release_tag=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          body: |
            ## Flowvy Routing - Auto Release

            **Build time:** ${{ steps.tag.outputs.release_tag }}

            ### Files
            - `geosite.dat` - Domain routing rules
            - `geoip.dat` - IP routing rules (from v2fly/geoip)

            ### Categories in geosite.dat
            - `category-cis-domain` - All CIS domains (RU, BY, KZ + AntiFilter + Re-filter)
            - `category-cis-ip` - All CIS IPs (AntiFilter + Re-filter)

            ### Usage in Xray/V2Ray
            ```json
            {
              "routing": {
                "rules": [
                  {"type": "field", "domain": ["geosite:category-cis-domain"], "outboundTag": "direct"},
                  {"type": "field", "ip": ["geosite:category-cis-ip"], "outboundTag": "direct"}
                ]
              }
            }
            ```

            ### Usage in Mihomo (Clash)
            ```yaml
            rules:
              - GEOSITE,category-cis-domain,DIRECT
              - GEOIP,RU,DIRECT
            ```

            ### Sources
            - [v2fly/domain-list-community](https://github.com/v2fly/domain-list-community)
            - [v2fly/geoip](https://github.com/v2fly/geoip)
            - [1andrevich/Re-filter-lists](https://github.com/1andrevich/Re-filter-lists)
            - [community.antifilter.download](https://community.antifilter.download/)
          files: |
            geosite.dat
            geosite.dat.sha256sum
            geoip.dat
            geoip.dat.sha256sum
            category-cis-domain.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
