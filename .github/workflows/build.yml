name: Build GeoSite & GeoIP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"  # Daily at 4 AM UTC
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      V2FLY_DOMAINS: https://raw.githubusercontent.com/v2fly/domain-list-community/master/data
      V2FLY_GEOIP: https://raw.githubusercontent.com/v2fly/geoip/release/text

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Create data directory
        run: mkdir -p data

      # --- Download v2fly domain lists with recursive includes ---
      - name: Download v2fly domains
        run: |
          set -e
          mkdir -p /tmp/v2fly

          echo "=== Downloading v2fly domain lists (recursive) ==="

          # Start with category-ru and process all includes
          echo "category-ru" > /tmp/queue.txt

          while [ -s /tmp/queue.txt ]; do
            file=$(head -1 /tmp/queue.txt)
            sed -i '1d' /tmp/queue.txt
            outfile="/tmp/v2fly/${file}"
            [ -f "$outfile" ] && continue

            echo "  Downloading: $file"
            if curl -fsSL "${V2FLY_DOMAINS}/${file}" -o "$outfile" 2>/dev/null; then
              # Add includes to queue
              grep '^include:' "$outfile" 2>/dev/null | sed 's/^include://' | sed 's/@.*//' >> /tmp/queue.txt || true
            else
              echo "  Warning: $file not found"
            fi
          done

          echo ""
          echo "Downloaded $(ls /tmp/v2fly/ | wc -l) files"
          ls -la /tmp/v2fly/

      # --- Build category-ru domains ---
      - name: Build category-ru
        run: |
          set -e

          echo "=== Building category-ru ==="

          # Combine all v2fly files, preserving format for Go parser
          for f in /tmp/v2fly/*; do
            [ -f "$f" ] || continue
            cat "$f"
          done | grep -v '^#' | grep -v '^$' | grep -v '^include:' | sort -u > data/category-ru

          echo "category-ru: $(wc -l < data/category-ru) entries"

          # Show sample
          echo "Sample entries:"
          head -20 data/category-ru

      # --- Download v2fly geoip ---
      - name: Download v2fly geoip
        run: |
          set -e

          echo "=== Downloading v2fly RU IPs ==="
          curl -fsSL "${V2FLY_GEOIP}/ru.txt" -o data/category-ru-ip

          echo "category-ru-ip: $(wc -l < data/category-ru-ip) CIDRs"

      # --- Build geosite.dat and geoip.dat ---
      - name: Build geosite.dat and geoip.dat
        run: |
          go mod tidy
          go run main.go \
            --datapath=./data \
            --outputdir=./ \
            --domainlists=category-ru \
            --iplists=category-ru-ip \
            --exportlists=category-ru,category-ru-ip

      # --- Generate Mihomo YAML files ---
      - name: Generate Mihomo YAML
        run: |
          echo "Generating category-ru.yaml..."
          { echo "payload:"; sed 's/^/  - DOMAIN-SUFFIX,/' "data/category-ru"; } > "category-ru.yaml"
          echo "category-ru.yaml: $(wc -l < category-ru.yaml) lines"

          echo "Generating category-ru-ip.yaml..."
          { echo "payload:"; sed 's/^/  - IP-CIDR,/' "data/category-ru-ip"; } > "category-ru-ip.yaml"
          echo "category-ru-ip.yaml: $(wc -l < category-ru-ip.yaml) lines"

      # --- Generate checksums ---
      - name: Generate checksums
        run: |
          sha256sum geosite.dat > geosite.dat.sha256sum
          sha256sum geoip.dat > geoip.dat.sha256sum

      # --- Create release ---
      - name: Generate release tag
        id: tag
        run: echo "release_tag=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          body: |
            ## Flowvy Routing - Auto Release

            **Build time:** ${{ steps.tag.outputs.release_tag }}

            ### Sources
            - **Domains:** [v2fly/domain-list-community](https://github.com/v2fly/domain-list-community) (category-ru)
            - **IPs:** [v2fly/geoip](https://github.com/v2fly/geoip) (ru.txt)

            ### Categories

            **geosite.dat - `category-ru`:**
            - Russian TLDs: `.ru`, `.su`, `.рф`, `.moscow`, `.tatar`
            - Russian services: Yandex, VK, Mail.ru, OK, Ozon, Wildberries, Avito, RuTube, Dzen, X5
            - Government: gosuslugi.ru, gov.ru, nalog.ru

            **geoip.dat - `category-ru-ip`:**
            - Official Russian IP ranges from v2fly/geoip

            ### Usage in Xray/V2Ray
            ```json
            {
              "routing": {
                "rules": [
                  {"type": "field", "domain": ["geosite:category-ru"], "outboundTag": "direct"},
                  {"type": "field", "ip": ["geoip:category-ru-ip"], "outboundTag": "direct"}
                ]
              }
            }
            ```

            ### Files
            - `geosite.dat` / `geoip.dat` - Xray/V2Ray format
            - `category-ru.yaml` / `category-ru-ip.yaml` - Mihomo format
            - `category-ru.txt` / `category-ru-ip.txt` - Plain text
          files: |
            geosite.dat
            geosite.dat.sha256sum
            geoip.dat
            geoip.dat.sha256sum
            category-ru.yaml
            category-ru-ip.yaml
            category-ru.txt
            category-ru-ip.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
