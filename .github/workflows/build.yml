name: Build GeoSite & GeoIP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * 1"  # Weekly on Monday at 4 AM UTC
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      METACUBEX_GEOSITE: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geosite
      METACUBEX_GEOIP: https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/meta/geo/geoip
      ITDOGINFO: https://raw.githubusercontent.com/itdoginfo/allow-domains/main/Russia
      HYDRAPONIQUE: https://raw.githubusercontent.com/hydraponique/roscomvpn-geosite/master/data
      V2FLY_GEOIP: https://raw.githubusercontent.com/v2fly/geoip/release/text

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Create directories
        run: mkdir -p data /tmp/sources

      # --- Download domain sources ---
      - name: Download domain sources
        run: |
          set -e

          echo "=== Downloading domain sources ==="

          # 1. MetaCubeX category-ru
          echo "Downloading MetaCubeX category-ru..."
          curl -fsSL "${METACUBEX_GEOSITE}/category-ru.list" -o /tmp/sources/metacubex-category-ru.txt
          echo "  $(wc -l < /tmp/sources/metacubex-category-ru.txt) entries"

          # 2. itdoginfo Russia outside
          echo "Downloading itdoginfo outside-raw..."
          curl -fsSL "${ITDOGINFO}/outside-raw.lst" -o /tmp/sources/itdoginfo-outside.txt
          echo "  $(wc -l < /tmp/sources/itdoginfo-outside.txt) entries"

          # 3. hydraponique category-ru
          echo "Downloading hydraponique category-ru..."
          curl -fsSL "${HYDRAPONIQUE}/category-ru" -o /tmp/sources/hydraponique-category-ru.txt
          echo "  $(wc -l < /tmp/sources/hydraponique-category-ru.txt) entries"

          # 4. MetaCubeX service lists
          for service in yandex mailru drweb kaspersky; do
            echo "Downloading MetaCubeX ${service}..."
            curl -fsSL "${METACUBEX_GEOSITE}/${service}.list" -o /tmp/sources/metacubex-${service}.txt 2>/dev/null || echo "  Warning: ${service}.list not found"
            [ -f "/tmp/sources/metacubex-${service}.txt" ] && echo "  $(wc -l < /tmp/sources/metacubex-${service}.txt) entries"
          done

          echo ""
          echo "Downloaded sources:"
          ls -la /tmp/sources/

      # --- Build category-ru (filtered to Russian TLDs + extra domains) ---
      - name: Build category-ru
        run: |
          set -e

          echo "=== Building category-ru ==="

          # Russian TLD patterns for filtering
          # .ru, .su, .рф (xn--p1ai), .moscow, .tatar, .дети (xn--d1acj3b)
          RU_TLDS='(\.(ru|su|xn--p1ai|moscow|tatar|xn--d1acj3b|xn--80adxhks)$)'

          # Combine all sources
          echo "Combining sources..."
          cat /tmp/sources/*.txt 2>/dev/null | \
            # Remove comments and empty lines
            grep -v '^#' | grep -v '^$' | grep -v '^!' | \
            # Remove prefixes (DOMAIN-SUFFIX,, DOMAIN,, +., full:, domain:, etc.)
            sed 's/^DOMAIN-SUFFIX,//' | \
            sed 's/^DOMAIN,//' | \
            sed 's/^+\.//' | \
            sed 's/^\.//' | \
            sed 's/^full://' | \
            sed 's/^domain://' | \
            sed 's/^regexp:/REGEXP:/' | \
            sed 's/^keyword:/KEYWORD:/' | \
            # Remove attributes (@attr)
            sed 's/@.*//' | \
            # Trim whitespace
            sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//' | \
            # Remove empty lines again
            grep -v '^$' | \
            # Sort and deduplicate
            sort -u > /tmp/all-domains.txt

          echo "Total unique entries: $(wc -l < /tmp/all-domains.txt)"

          # Filter to Russian TLDs only
          echo "Filtering to Russian TLDs..."
          grep -iE "${RU_TLDS}" /tmp/all-domains.txt > /tmp/ru-domains.txt || true

          # Also keep regexp and keyword entries that might be relevant
          grep -iE '^(REGEXP:|KEYWORD:)' /tmp/all-domains.txt >> /tmp/ru-domains.txt || true

          # Add extra domains from ru-inline file
          echo "Adding extra domains from data/ru-inline..."
          cat data/ru-inline >> /tmp/ru-domains.txt

          # Final sort and dedupe (remove comments and empty lines from extras)
          grep -v '^#' /tmp/ru-domains.txt | grep -v '^$' | sed 's/^[[:space:]]*//' | sort -u > data/category-ru

          echo "category-ru: $(wc -l < data/category-ru) entries"

          # Show sample
          echo ""
          echo "Sample entries:"
          head -30 data/category-ru

      # --- Build apple list ---
      - name: Build apple list
        run: |
          set -e

          echo "=== Building apple list ==="

          # Download apple list from MetaCubeX
          curl -fsSL "${METACUBEX_GEOSITE}/apple.list" -o /tmp/apple-raw.txt

          # Process apple list
          cat /tmp/apple-raw.txt | \
            grep -v '^#' | grep -v '^$' | \
            sed 's/^DOMAIN-SUFFIX,//' | \
            sed 's/^DOMAIN,/full:/' | \
            sed 's/^+\.//' | \
            sed 's/^\.//' | \
            sort -u > data/apple

          echo "apple: $(wc -l < data/apple) entries"

          # Show sample
          echo ""
          echo "Sample entries:"
          head -20 data/apple

      # --- Build private list (domains + IPs) ---
      - name: Build private list
        run: |
          set -e

          echo "=== Building private list ==="

          # Download private domains from MetaCubeX
          echo "Downloading private domains..."
          curl -fsSL "${METACUBEX_GEOSITE}/private.list" -o /tmp/private-domains-raw.txt
          echo "  $(wc -l < /tmp/private-domains-raw.txt) entries"

          # Process private domains
          cat /tmp/private-domains-raw.txt | \
            grep -v '^#' | grep -v '^$' | \
            sed 's/^DOMAIN-SUFFIX,//' | \
            sed 's/^DOMAIN,/full:/' | \
            sed 's/^+\.//' | \
            sed 's/^\.//' | \
            sort -u > data/private

          echo "private: $(wc -l < data/private) domain entries"

          # Download private IPs from MetaCubeX
          echo "Downloading private IPs..."
          curl -fsSL "${METACUBEX_GEOIP}/private.list" -o /tmp/private-ip-raw.txt
          echo "  $(wc -l < /tmp/private-ip-raw.txt) entries"

          # Process private IPs
          cat /tmp/private-ip-raw.txt | \
            grep -v '^#' | grep -v '^$' | \
            sed 's/^IP-CIDR,//' | \
            sed 's/^IP-CIDR6,//' | \
            sed 's/,no-resolve$//' | \
            sort -u > data/private-ip

          echo "private-ip: $(wc -l < data/private-ip) CIDR entries"

      # --- Download GeoIP lists ---
      - name: Download GeoIP lists
        run: |
          set -e

          echo "=== Downloading GeoIP lists ==="

          echo "Downloading RU IPs..."
          curl -fsSL "${V2FLY_GEOIP}/ru.txt" -o data/category-ru-ip
          echo "category-ru-ip: $(wc -l < data/category-ru-ip) CIDRs"

          echo "Downloading BY IPs..."
          curl -fsSL "${V2FLY_GEOIP}/by.txt" -o data/category-by-ip
          echo "category-by-ip: $(wc -l < data/category-by-ip) CIDRs"

          echo "Downloading KZ IPs..."
          curl -fsSL "${V2FLY_GEOIP}/kz.txt" -o data/category-kz-ip
          echo "category-kz-ip: $(wc -l < data/category-kz-ip) CIDRs"

      # --- Build geosite.dat and geoip.dat ---
      - name: Build geosite.dat and geoip.dat
        run: |
          go mod tidy
          go run main.go \
            --datapath=./data \
            --outputdir=./ \
            --domainlists=category-ru,apple,private \
            --iplists=category-ru-ip,category-by-ip,category-kz-ip,private-ip \
            --exportlists=category-ru,apple,private,category-ru-ip,category-by-ip,category-kz-ip,private-ip

      # --- Generate Mihomo YAML files ---
      - name: Generate Mihomo YAML
        run: |
          # Domain lists - convert v2fly format to Mihomo format
          for list in category-ru apple private; do
            echo "Generating ${list}.yaml..."
            {
              echo "payload:"
              while IFS= read -r line; do
                # Skip empty lines
                [ -z "$line" ] && continue
                # Convert based on prefix
                case "$line" in
                  keyword:*)
                    echo "  - DOMAIN-KEYWORD,${line#keyword:}"
                    ;;
                  full:*)
                    echo "  - DOMAIN,${line#full:}"
                    ;;
                  regexp:*)
                    echo "  - DOMAIN-REGEX,${line#regexp:}"
                    ;;
                  *)
                    echo "  - DOMAIN-SUFFIX,$line"
                    ;;
                esac
              done < "data/${list}"
            } > "${list}.yaml"
            echo "${list}.yaml: $(wc -l < ${list}.yaml) lines"
          done

          # IP lists
          for list in category-ru-ip category-by-ip category-kz-ip private-ip; do
            echo "Generating ${list}.yaml..."
            { echo "payload:"; sed 's/^/  - IP-CIDR,/' "data/${list}"; } > "${list}.yaml"
            echo "${list}.yaml: $(wc -l < ${list}.yaml) lines"
          done

      # --- Generate checksums ---
      - name: Generate checksums
        run: |
          sha256sum geosite.dat > geosite.dat.sha256sum
          sha256sum geoip.dat > geoip.dat.sha256sum

      # --- Create release ---
      - name: Generate release tag
        id: tag
        run: echo "release_tag=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        continue-on-error: true  # Ignore transient network timeouts (release usually succeeds anyway)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          body: |
            ## Flowvy Routing - Auto Release

            **Build time:** ${{ steps.tag.outputs.release_tag }}

            ### Sources
            - **Domains:** MetaCubeX, itdoginfo, hydraponique (filtered to Russian TLDs + extras)
            - **Apple:** MetaCubeX apple.list
            - **Private:** MetaCubeX private (localhost, LAN, etc.)
            - **IPs:** v2fly/geoip (RU, BY, KZ) + MetaCubeX private

            ### Categories

            **geosite.dat:**
            - `category-ru` - Russian domains (.ru, .su, .by + popular services)
            - `apple` - Apple services
            - `private` - Private/local domains (localhost, local, lan, etc.)

            **geoip.dat:**
            - `category-ru-ip` - Russian IP ranges
            - `category-by-ip` - Belarus IP ranges
            - `category-kz-ip` - Kazakhstan IP ranges
            - `private-ip` - Private IP ranges (10.x, 192.168.x, etc.)

            ### Usage in Xray/V2Ray
            ```json
            {
              "routing": {
                "rules": [
                  {"type": "field", "domain": ["geosite:private"], "outboundTag": "direct"},
                  {"type": "field", "ip": ["geoip:private-ip"], "outboundTag": "direct"},
                  {"type": "field", "domain": ["geosite:category-ru"], "outboundTag": "direct"},
                  {"type": "field", "domain": ["geosite:apple"], "outboundTag": "direct"},
                  {"type": "field", "ip": ["geoip:category-ru-ip", "geoip:category-by-ip", "geoip:category-kz-ip"], "outboundTag": "direct"}
                ]
              }
            }
            ```

            ### Files
            - `geosite.dat` / `geoip.dat` - Xray/V2Ray format
            - `*.yaml` - Mihomo rule-provider format
            - `*.txt` - Plain text exports
          files: |
            geosite.dat
            geosite.dat.sha256sum
            geoip.dat
            geoip.dat.sha256sum
            category-ru.yaml
            category-ru-ip.yaml
            category-by-ip.yaml
            category-kz-ip.yaml
            apple.yaml
            private.yaml
            private-ip.yaml
            category-ru.txt
            category-ru-ip.txt
            category-by-ip.txt
            category-kz-ip.txt
            apple.txt
            private.txt
            private-ip.txt
