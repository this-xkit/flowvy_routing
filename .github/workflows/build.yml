name: Build GeoSite & GeoIP

on:
  workflow_dispatch:
  schedule:
    - cron: "0 4 * * *"  # Daily at 4 AM UTC
  push:
    branches:
      - main

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      V2FLY_DATA_URL: https://raw.githubusercontent.com/v2fly/domain-list-community/master/data
      ANTIFILTER_DOMAINS: https://community.antifilter.download/list/domains.lst
      ANTIFILTER_IPS: https://community.antifilter.download/list/community.lst
      REFILTER_DOMAINS: https://raw.githubusercontent.com/1andrevich/Re-filter-lists/main/domains_all.lst
      REFILTER_IPS: https://raw.githubusercontent.com/1andrevich/Re-filter-lists/main/ipsum.lst

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache: true

      - name: Create data directory
        run: mkdir -p data

      # --- Build category-cis-domain (all CIS domains combined) ---
      - name: Build category-cis-domain
        run: |
          set -e
          mkdir -p /tmp/v2fly

          echo "=== Downloading V2Fly CIS categories (with recursive includes) ==="

          # Queue-based download to handle includes (avoids subshell issues)
          echo "category-ru" > /tmp/v2fly-queue.txt
          echo "category-gov-ru" >> /tmp/v2fly-queue.txt

          while [ -s /tmp/v2fly-queue.txt ]; do
            # Get first item from queue
            file=$(head -1 /tmp/v2fly-queue.txt)
            sed -i '1d' /tmp/v2fly-queue.txt

            outfile="/tmp/v2fly/${file}"

            # Skip if already downloaded
            [ -f "$outfile" ] && continue

            echo "  Downloading: $file"
            if curl -fsSL "${V2FLY_DATA_URL}/${file}" -o "$outfile" 2>/dev/null; then
              # Add includes to queue
              grep '^include:' "$outfile" 2>/dev/null | sed 's/^include://' | sed 's/@.*//' >> /tmp/v2fly-queue.txt || true
            else
              echo "  Warning: Failed to download $file"
            fi
          done

          echo "=== Downloaded v2fly files ==="
          ls -la /tmp/v2fly/ | head -20
          echo "Total v2fly files: $(ls /tmp/v2fly/ | wc -l)"

          echo "=== Downloading AntiFilter domains ==="
          curl -fsSL "$ANTIFILTER_DOMAINS" -o /tmp/antifilter-domains.lst || echo "Warning: Failed to download AntiFilter"

          echo "=== Downloading Re-filter domains ==="
          curl -fsSL "$REFILTER_DOMAINS" -o /tmp/refilter-domains.lst || echo "Warning: Failed to download Re-filter"

          echo "=== Combining all CIS domains ==="

          # Extract domains from all v2fly files
          for f in /tmp/v2fly/*; do
            [ -f "$f" ] || continue
            cat "$f" | \
              grep -v '^#' | \
              grep -v '^$' | \
              grep -v '^include:' | \
              grep -v '^regexp:' | \
              grep -v '^keyword:' | \
              sed 's/^full://g' | \
              sed 's/^domain://g' | \
              sed 's/@.*//g' | \
              tr -d ' '
          done > /tmp/v2fly-domains.txt

          echo "V2fly domains: $(wc -l < /tmp/v2fly-domains.txt)"

          # Combine all sources and normalize
          cat /tmp/v2fly-domains.txt \
              /tmp/antifilter-domains.lst \
              /tmp/refilter-domains.lst 2>/dev/null | \
            grep -v '^#' | \
            grep -v '^$' | \
            tr '[:upper:]' '[:lower:]' | \
            sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | \
            grep -E '^[a-z0-9]([a-z0-9\-]*[a-z0-9])?(\.[a-z0-9]([a-z0-9\-]*[a-z0-9])?)*$' | \
            sort -u > /tmp/all-domains.txt

          echo "Total unique domains: $(wc -l < /tmp/all-domains.txt)"
          cp /tmp/all-domains.txt data/category-cis-domain
          echo "category-cis-domain: $(wc -l < data/category-cis-domain) domains"

          # Verify file is not empty
          if [ ! -s data/category-cis-domain ]; then
            echo "ERROR: category-cis-domain is empty!"
            exit 1
          fi

      # --- Build category-cis-ip (all CIS IPs combined) ---
      - name: Build category-cis-ip
        run: |
          set -e

          echo "=== Downloading AntiFilter IPs ==="
          curl -fsSL "$ANTIFILTER_IPS" -o /tmp/antifilter-ips.lst || echo "Warning: Failed to download AntiFilter IPs"

          echo "=== Downloading Re-filter IPs ==="
          curl -fsSL "$REFILTER_IPS" -o /tmp/refilter-ips.lst || echo "Warning: Failed to download Re-filter IPs"

          echo "=== Debug: checking downloaded files ==="
          ls -la /tmp/antifilter-ips.lst /tmp/refilter-ips.lst 2>/dev/null || true

          echo "=== Combining all CIS IPs ==="
          cat /tmp/antifilter-ips.lst /tmp/refilter-ips.lst 2>/dev/null | \
            grep -v '^#' | \
            grep -v '^$' | \
            sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | \
            grep -E '^[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}(/[0-9]{1,2})?$' | \
            sort -u -t. -k1,1n -k2,2n -k3,3n -k4,4n > data/category-cis-ip

          echo "category-cis-ip: $(wc -l < data/category-cis-ip) IPs"

          # Verify file is not empty
          if [ ! -s data/category-cis-ip ]; then
            echo "ERROR: category-cis-ip is empty!"
            exit 1
          fi

      # --- Build geosite.dat and geoip.dat ---
      - name: Build geosite.dat and geoip.dat
        run: |
          go mod tidy
          go run main.go \
            --datapath=./data \
            --outputdir=./ \
            --domainlists=category-cis-domain \
            --iplists=category-cis-ip \
            --exportlists=category-cis-domain,category-cis-ip

      # --- Generate Mihomo YAML files ---
      - name: Generate Mihomo YAML
        run: |
          echo "Generating category-cis-domain.yaml..."
          { echo "payload:"; sed 's/^/  - DOMAIN-SUFFIX,/' data/category-cis-domain; } > category-cis-domain.yaml
          echo "category-cis-domain.yaml: $(wc -l < category-cis-domain.yaml) lines"

          echo "Generating category-cis-ip.yaml..."
          { echo "payload:"; sed 's/^/  - IP-CIDR,/' data/category-cis-ip; } > category-cis-ip.yaml
          echo "category-cis-ip.yaml: $(wc -l < category-cis-ip.yaml) lines"

      # --- Generate checksums ---
      - name: Generate checksums
        run: |
          sha256sum geosite.dat > geosite.dat.sha256sum
          sha256sum geoip.dat > geoip.dat.sha256sum

      # --- Create release ---
      - name: Generate release tag
        id: tag
        run: echo "release_tag=$(date +%Y%m%d%H%M%S)" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: Release ${{ steps.tag.outputs.release_tag }}
          body: |
            ## Flowvy Routing - Auto Release

            **Build time:** ${{ steps.tag.outputs.release_tag }}

            ### Files
            **Xray/V2Ray:**
            - `geosite.dat` - Domain routing rules (category-cis-domain)
            - `geoip.dat` - IP routing rules (category-cis-ip from AntiFilter + Re-filter)

            **Mihomo (Clash):**
            - `category-cis-domain.yaml` - Domain rules (DOMAIN-SUFFIX)
            - `category-cis-ip.yaml` - IP rules (IP-CIDR)

            ### Categories
            **geosite.dat:**
            - `category-cis-domain` - All CIS domains (RU, BY, KZ + AntiFilter + Re-filter)

            **geoip.dat:**
            - `category-cis-ip` - All CIS IPs (AntiFilter + Re-filter)

            ### Usage in Xray/V2Ray
            ```json
            {
              "routing": {
                "rules": [
                  {"type": "field", "domain": ["geosite:category-cis-domain"], "outboundTag": "direct"},
                  {"type": "field", "ip": ["geoip:category-cis-ip"], "outboundTag": "direct"}
                ]
              }
            }
            ```

            ### Usage in Mihomo (Clash)
            ```yaml
            rule-providers:
              cis-domain:
                type: http
                behavior: domain
                url: "https://github.com/this-xkit/flowvy_routing/releases/latest/download/category-cis-domain.yaml"
                path: ./rules/cis-domain.yaml
                interval: 86400
              cis-ip:
                type: http
                behavior: ipcidr
                url: "https://github.com/this-xkit/flowvy_routing/releases/latest/download/category-cis-ip.yaml"
                path: ./rules/cis-ip.yaml
                interval: 86400

            rules:
              - RULE-SET,cis-domain,DIRECT
              - RULE-SET,cis-ip,DIRECT
            ```

            ### Sources
            - [v2fly/domain-list-community](https://github.com/v2fly/domain-list-community)
            - [v2fly/geoip](https://github.com/v2fly/geoip)
            - [1andrevich/Re-filter-lists](https://github.com/1andrevich/Re-filter-lists)
            - [community.antifilter.download](https://community.antifilter.download/)
          files: |
            geosite.dat
            geosite.dat.sha256sum
            geoip.dat
            geoip.dat.sha256sum
            category-cis-domain.yaml
            category-cis-ip.yaml
            category-cis-domain.txt
            category-cis-ip.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
