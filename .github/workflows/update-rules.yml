name: Update CIS Rules

on:
  schedule:
    - cron: '0 4 * * *' # Запускать каждый день в 4 утра
  push:
    paths:
      - 'src/**'
      - 'helpers/**'
      - '.github/workflows/**'
  workflow_dispatch: # Кнопка ручного запуска

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r helpers/requirements.txt

      - name: Run builder
        run: python helpers/builder.py

      - name: Commit and Push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-update category-cis"
          file_pattern: "dist/*"
